{% extends "emails/base_email.html" %}

{% block content %}
<h2 style="margin:0 0 16px; font-size:24px; color:#007474;">
    Salut, {{ user_name }}!
</h2>

<p style="font-size:16px; line-height:1.65; margin:0 0 16px;">
    Comanda ta <strong>#{{ order_id }}</strong> a fost înregistrată cu succes.
</p>

<div style="background:#fff7e6; border:1px solid rgba(254,164,5,.4); border-left:5px solid #fea405; padding:16px; margin:24px 0; border-radius:8px;">
    <p style="margin:0; font-size:15px; color:#2f4858;">
        <strong>Status comandă:</strong> În așteptare
    </p>
    <p style="margin:6px 0 0; font-size:15px; color:#2f4858;">
        <strong>Număr comandă:</strong> #{{ order_id }}
    </p>
</div>

<p style="font-size:15px; line-height:1.6; margin:0 0 24px;">
    Vendorul va confirma comanda în cel mai scurt timp.
</p>

<div style="text-align:center; margin:30px 0;">
    <a href="{{ site_url }}" style="display:inline-block; background:#8aa624; color:white; text-decoration:none; padding:13px 24px; border-radius:8px; font-size:15px; font-weight:bold;">
        Vezi detaliile comenzii
    </a>
</div>
{% endblock %}
