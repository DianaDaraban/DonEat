<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <title>{{ title }}</title>
  </head>

  <body style="margin:0; padding:0; background:#fff8f0; font-family:Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:32px 0; background:#fff8f0;">
      <tr>
        <td align="center">
          <table width="620" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:16px; overflow:hidden; border:1px solid rgba(254,164,5,.45); box-shadow:0 8px 26px rgba(47,72,88,.12);">
            <tr>
              <td style="
                        padding:28px;
                        text-align:center;
                        background:
    linear-gradient(217deg, rgba(254,164,5,0.08), transparent 65%),
    linear-gradient(127deg, rgba(138,166,36,0.12), transparent 95%),
    #f9fbf4;
                    ">
                <img src="cid:logo" alt="DonEat" style="height:80px; margin-bottom:8px;" />
                <p style="margin:8px 0 0; font-size:16px; color:#2f4858; font-weight:500;">{{ subtitle }}</p>
              </td>
            </tr>

            <tr>
              <td style="padding:34px 38px; color:#2f4858;">
                {% block content %}

                {% endblock %}

                <p style="font-size:14px; color:#6b7280; line-height:1.6; margin-top:32px;">
                  Cu drag,<br />
                  <strong>Echipa DonEat</strong>
                </p>
              </td>
            </tr>

            <tr>
              <td style="background:#f4f4f4; padding:18px 24px; text-align:center; font-size:12px; color:#888;">Acest email a fost trimis automat. Te rugăm să nu răspunzi la acest mesaj.</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
